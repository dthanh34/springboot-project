<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Healthy Food</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>

    <div class="login-container">
        <!-- Logo -->
        <div class="brand" style="justify-content: center; margin-bottom: 32px; display: flex; align-items: center; gap: 12px;">
            <div class="brand-icon" style="background-color: #10b981; width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px;">
                <i class="fa-solid fa-leaf"></i>
            </div>
            <h2 style="color: #10b981; font-weight: 700;">Healthy Food</h2>
        </div>

        <h1 class="login-title">Đăng Nhập</h1>
        <p class="login-subtitle">Nhập email và mật khẩu để tiếp tục</p>

        <!-- Vùng hiển thị thông báo -->
        <div id="msg-container"></div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="NguyenvanA@email.com" required>
            </div>

            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="••••••••••" required>
            </div>

            <button type="submit" id="btnLogin" class="btn-login">Đăng nhập</button>
        </form>

        <div class="register-link">
            Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
        </div>
    </div>

    <script src="/assets/js/login.js"></script>
</body>
</html>
