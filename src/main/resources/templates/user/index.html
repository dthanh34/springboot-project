<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthyFood AI - Quản lý dinh dưỡng thông minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/user.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
</head>
<body>
<div class="dashboard-container">
    <aside th:replace="~{user/sidebar :: sidebar_fragment}"></aside>

    <main class="main-content">
        <header class="header">
            <div class="welcome">
                <h1 id="user-name"></h1>
                <p>Chúc bạn một ngày tốt lành!</p>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <p class="stat-label">Calo mục tiêu/ngày</p>
                <h2 id="tdee-value">0 kcal</h2>
                <div class="progress-bar"><div class="fill" style="width: 0%"></div></div>
                <small>Dựa trên TDEE của bạn</small>
            </div>
            <div class="stat-card">
                <p class="stat-label">Chỉ số BMI</p>
                <h2 id="bmi-value">0</h2>
                <span class="badge" id="bmi-status">Đang tính...</span>
            </div>
            <div class="stat-card">
                <p class="stat-label">Chỉ số BMR</p>
                <h2 id="bmr-value">0</h2>
                <small>Năng lượng nghỉ ngơi</small>
            </div>
            <div class="stat-card highlight-blue">
                <p class="stat-label">Mục tiêu hiện tại</p>
                <h2 id="goal-value">Chưa có</h2>
                <small>Cập nhật trong hồ sơ</small>
            </div>
        </div>

        <section class="filter-section">
            <div class="filter-container" style="display: flex; gap: 20px; align-items: center; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <div class="meal-count-config">
                    <label>Số bữa ăn:</label>
                    <select id="meal-count-select" class="form-control" style="padding: 8px; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="3">3 bữa (Sáng - Trưa - Tối)</option>
                        <option value="4">4 bữa (Sáng - Trưa - Phụ - Tối)</option>
                        <option value="2">2 bữa (Sáng - Tối)</option>
                    </select>
                </div>
                <div class="filter-item disease-picker">
                    <label class="disease-label">Hôm nay cơ thể bạn cảm thấy thế nào?</label>
                    <div id="disease-chip-picker" class="disease-chips-group"></div>
                </div>
                <button id="btn-update-safe-foods" class="btn-confirm" style="background: #2ecc71; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;">
                    Cập nhật thực đơn an toàn
                </button>
            </div>
        </section>

        <section class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Kế hoạch ăn uống hôm nay</h3>
                <button id="btn-save-daily-plan" class="btn-save-main" style="background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);">
                    <i class="fas fa-save"></i> Lưu thực đơn hôm nay
                </button>
            </div>
            <div id="meal-planner-container" class="meal-planner-row">
                </div>
        </section>
    </main>
</div>

<div id="foodModal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <h3>Chọn món ăn phù hợp</h3>
            <span onclick="closeModal()" style="cursor:pointer; font-size:28px;">&times;</span>
        </div>
        <div id="modal-food-list" class="food-grid-selection"></div>
    </div>
</div>

<script th:src="@{/js/user_dashboard.js}"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
