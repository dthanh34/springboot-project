<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món ăn yêu thích</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/home.css">
    <link rel="stylesheet" href="/assets/css/favorites.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-leaf text-white"></i></div>
            <div class="brand-text">
                <h2>Healthy Food</h2>
                <span>Dinh dưỡng thông minh</span>
            </div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/home" class="nav-link"><i class="fa-solid fa-house"></i> Trang chủ</a></li>
            <li class="nav-item"><a href="/profile" class="nav-link"><i class="fa-regular fa-user"></i> Hồ sơ sức khỏe</a></li>
            <li class="nav-item"><a href="/foods" class="nav-link"><i class="fa-solid fa-utensils"></i> Món ăn</a></li>
            <li class="nav-item"><a href="/meal_plan" class="nav-link"><i class="fa-regular fa-calendar-days"></i> Thực đơn</a></li>
            <li class="nav-item"><a href="/progress" class="nav-link"><i class="fa-solid fa-chart-line"></i> Tiến trình</a></li>
            <li class="nav-item"><a href="/favorites" class="nav-link active"><i class="fa-solid fa-heart"></i> Yêu thích</a></li>
            <li class="nav-item"><a href="/search" class="nav-link"><i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm</a></li>
            <li class="nav-item"><a href="/settings" class="nav-link"><i class="fa-solid fa-gear"></i> Cài đặt</a></li>
        </ul>
        <div class="logout-box">
            <a href="/logout" class="nav-link"><i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất</a>
        </div>
    </aside>

    <main class="main-content">
        <h1>Món ăn yêu thích</h1>
        <p class="sub-text">Quản lý danh sách món bạn đã yêu thích .</p>

        <div class="list-switcher">
            <button class="switch-tab active" data-tab="favorites">
                <i class="fa-regular fa-heart"></i> Yêu thích
            </button>
        </div>

        <div class="search-row">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="favSearchInput" placeholder="Tìm kiếm món ăn...">
            </div>
            <button id="btnSearchFav" class="btn-filter"><i class="fa-solid fa-sliders"></i> Tìm Kiếm</button>
        </div>

        <div id="alert-container"></div>

        <div id="foods-grid" class="grid">
            <!-- Dữ liệu sẽ được JS đổ vào đây -->
        </div>

        <!-- Trạng thái trống -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <i id="empty-icon" class="fa-regular fa-heart"></i>
            <p id="empty-text">Bạn chưa có món ăn yêu thích nào.</p>
            <a href="/foods" class="btn-go-foods">Khám phá món ăn</a>
        </div>
    </main>

    <script src="/assets/js/user/favorites.js"></script>
</body>
</html>
