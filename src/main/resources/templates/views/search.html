<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm kiếm món ăn</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/home.css">
    
    <style>
        .search-header { margin-bottom: 25px; }
        .search-header h1 { font-size: 26px; font-weight: bold; color: #333; margin-bottom: 8px; }
        .search-header .sub-text { color: #888; font-size: 15px; }
        .search-bar-wrapper { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; }
        .search-input-box { flex: 1; display: flex; align-items: center; background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px 15px; }
        .search-input-box i.fa-magnifying-glass { color: #888; margin-right: 12px; font-size: 16px; }
        .search-input-box input { border: none; outline: none; width: 100%; font-size: 15px; color: #333; }
        .btn-clear { color: #bbb; text-decoration: none; font-size: 16px; margin-left: 10px; cursor: pointer; display: none; }
        .btn-filter { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .result-count { font-size: 12px; color: #888; margin-bottom: 20px; }
        .grid-search { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .food-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #eee; text-decoration: none; color: inherit; display: block; transition: transform 0.2s, box-shadow 0.2s; }
        .food-card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.08); }
        .img-wrapper { position: relative; height: 180px; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .icon-heart { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #aaa; font-size: 13px; }
        .badge-safe { position: absolute; top: 10px; right: 10px; background: #28a745; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .card-info { padding: 15px; }
        .card-info h3 { font-size: 15px; font-weight: 700; margin: 0 0 6px 0; color: #333; }
        .card-info .calo { font-size: 12px; color: #888; margin-bottom: 12px; }
        .card-info .match { font-size: 12px; font-weight: 700; color: #28a745; display: flex; align-items: center; gap: 4px; }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 0; color: #888; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-leaf text-white"></i></div>
            <div class="brand-text"><h2>Healthy Food</h2><span>Dinh dưỡng thông minh</span></div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/home" class="nav-link"><i class="fa-solid fa-house"></i> Trang chủ</a></li>
            <li class="nav-item"><a href="/profile" class="nav-link"><i class="fa-regular fa-user"></i> Hồ sơ sức khỏe</a></li>
            <li class="nav-item"><a href="/foods" class="nav-link"><i class="fa-solid fa-utensils"></i> Món ăn</a></li>
            <li class="nav-item"><a href="/meal_plan" class="nav-link"><i class="fa-regular fa-calendar-days"></i> Thực menus</a></li>
            <li class="nav-item"><a href="/progress" class="nav-link"><i class="fa-solid fa-chart-line"></i> Tiến trình</a></li>
            <li class="nav-item"><a href="/favorites" class="nav-link"><i class="fa-solid fa-heart"></i> Yêu thích</a></li>
            <li class="nav-item"><a href="/search" class="nav-link active"><i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm</a></li>
            <li class="nav-item"><a href="/settings" class="nav-link"><i class="fa-solid fa-gear"></i> Cài đặt</a></li>
        </ul>
        <div class="logout-box">
            <a href="/logout" class="nav-link"><i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="search-header">
            <h1>Tìm kiếm món ăn</h1>
            <p class="sub-text">Tìm kiếm món ăn phù hợp với sức khỏe của bạn</p>
        </div>

        <div class="search-bar-wrapper">
            <div class="search-input-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Tìm kiếm món ăn....">
                <span id="btnClear" class="btn-clear" title="Xóa từ khóa"><i class="fa-solid fa-circle-xmark"></i></span>
            </div>
            <button id="btnSearch" class="btn-filter"><i class="fa-solid fa-sliders"></i> Tìm Kiếm</button>
        </div>

        <div class="result-count">Tìm thấy <span id="count-number">0</span> món ăn</div>

        <div class="grid-search" id="food-results">
            <!-- Kết quả sẽ được JS đổ vào đây -->
        </div>
    </main>

    <script src="/assets/js/user/search.js"></script>
</body>
</html>
