<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực đơn - Healthy Food</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/home.css">
    <link rel="stylesheet" href="/assets/css/meal_plan.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-leaf text-white"></i></div>
            <div class="brand-text"><h2>Healthy Food</h2><span>Dinh dưỡng thông minh</span></div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/home" class="nav-link"><i class="fa-solid fa-house"></i> Trang chủ</a></li>
            <li class="nav-item"><a href="/profile" class="nav-link"><i class="fa-regular fa-user"></i> Hồ sơ sức khỏe</a></li>
            <li class="nav-item"><a href="/foods" class="nav-link"><i class="fa-solid fa-utensils"></i> Món ăn</a></li>
            <li class="nav-item"><a href="/meal_plan" class="nav-link active"><i class="fa-regular fa-calendar-days"></i> Thực đơn</a></li>
            <li class="nav-item"><a href="/progress" class="nav-link"><i class="fa-solid fa-chart-line"></i> Tiến trình</a></li>
            <li class="nav-item"><a href="/favorites" class="nav-link"><i class="fa-solid fa-heart"></i> Yêu thích</a></li>
            <li class="nav-item"><a href="/search" class="nav-link"><i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm</a></li>
            <li class="nav-item"><a href="/settings" class="nav-link"><i class="fa-solid fa-gear"></i> Cài đặt</a></li>
        </ul>
    </aside>

    <main class="main-content meal-page">
        <header class="meal-header">
            <div>
                <h1>Thực đơn</h1>
                <p id="edit-notice">Dữ liệu hiển thị theo ngày bạn chọn.</p>
            </div>
            <div class="calo-badge"><i class="fa-solid fa-fire-flame-curved"></i> <span id="total-day-calo">0</span> calo</div>
        </header>

        <!-- Slider chọn ngày -->
        <section class="card slider-card">
            <button class="slider-nav" id="prev-week">&lt;</button>
            <div class="week-track" id="week-slider-container">
                <!-- JS render slider days here -->
            </div>
            <button class="slider-nav" id="next-week">&gt;</button>
        </section>

        <!-- Bộ lọc ngày -->
        <section class="card filter-card">
            <div class="date-form">
                <label for="date-input">Ngày thực đơn</label>
                <input id="date-input" type="date">
                <button id="btn-view-date" class="btn-secondary">Xem</button>
            </div>
        </section>

        <!-- Danh sách bữa ăn -->
        <section class="meal-list" id="meal-sections-container">
            <!-- JS render Breakfast, Lunch, Dinner here -->
        </section>
    </main>

    <!-- Modal điều chỉnh món ăn -->
    <div class="modal" id="adjustModal">
        <div class="modal-card">
            <button type="button" class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            <h3 id="adjustTitle">Điều chỉnh món ăn</h3>
            <form id="adjustMealForm">
                <input type="hidden" id="adjustMealTypeId" name="mealTypeId">
                <div class="form-group">
                    <label>Chọn món ăn</label>
                    <select id="adjustFoodIds" name="foodIds" multiple class="searchable-dropdown">
                        <!-- JS render all food options -->
                    </select>
                </div>
                <button class="btn-save" type="submit"><i class="fa-regular fa-floppy-disk"></i> Lưu thay đổi</button>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="/assets/js/user/meal_plan.js"></script>
</body>
</html>
